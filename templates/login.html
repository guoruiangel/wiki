<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wiki 登录</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: #f0f2f5;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}
.login-container {
    background: white;
    padding: 40px;
    border-radius: 12px;
    box-shadow: 0 2px 12px rgba(0,0,0,0.1);
    width: 360px;
}
h1 { text-align: center; margin-bottom: 30px; color: #1a1a2e; font-size: 24px; }
.form-group { margin-bottom: 20px; }
label { display: block; margin-bottom: 6px; color: #555; font-size: 14px; }
input {
    width: 100%;
    padding: 10px 12px;
    border: 1px solid #ddd;
    border-radius: 6px;
    font-size: 15px;
    transition: border-color 0.2s;
}
input:focus { outline: none; border-color: #4a90d9; box-shadow: 0 0 0 3px rgba(74,144,217,0.15); }
button {
    width: 100%;
    padding: 12px;
    background: #4a90d9;
    color: white;
    border: none;
    border-radius: 6px;
    font-size: 16px;
    cursor: pointer;
    transition: background 0.2s;
}
button:hover { background: #357abd; }
.error { color: #e74c3c; text-align: center; margin-bottom: 15px; font-size: 14px; }
.hint { text-align: center; margin-top: 16px; color: #999; font-size: 13px; }
</style>
</head>
<body>
<div class="login-container">
    <h1>📚 Wiki</h1>
    {% if error %}
    <div class="error">{{ error }}</div>
    {% endif %}
    <form method="post" action="/wiki/login">
        <div class="form-group">
            <label>用户名</label>
            <input type="text" name="username" required autofocus>
        </div>
        <div class="form-group">
            <label>密码</label>
            <input type="password" name="password" required>
        </div>
        <button type="submit">登录</button>
    </form>
    <div class="hint">默认管理员: admin / admin123</div>
</div>
</body>
</html>
